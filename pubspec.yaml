name: vera_music
description: Vera Music Beta - YouTube tabanlı müzik indirme ve çalma uygulaması.
publish_to: 'none'
version: 0.1.0+1
environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.7.0'
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  google_fonts: ^4.0.4
  provider: ^6.0.5
  audio_service: ^0.18.12
  just_audio: ^0.9.36
  youtube_explode_dart: ^3.0.5
  dio: ^5.3.0
  path_provider: ^2.1.0
  permission_handler: ^11.3.0
  sliding_up_panel: ^2.0.0
  animations: ^2.0.6
  shared_preferences: ^2.2.2
  device_info_plus: ^9.1.1
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

dependency_overrides:
  youtube_explode_dart: ^3.0.5
  path: ^1.9.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  intl_utils: ^2.8.7
flutter:
  uses-material-design: true
  generate: true
